# Synergy Chat - Application Services (Web + API)
#
# Prerequisites: Infrastructure must be running first
#   docker compose up -d
#
# Usage:
#   docker compose -f docker-compose.apps.yml up -d        # Start apps
#   docker compose -f docker-compose.apps.yml logs -f      # View logs
#   docker compose -f docker-compose.apps.yml down         # Stop apps

name: synergy-chat

services:
  # ==========================================================================
  # APPLICATION - Next.js Frontend
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: synergy-web
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - SURREAL_URL=http://surrealdb:8000/rpc
      - REDIS_HOST=redis
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/node_modules
    networks:
      - synergy-network
    restart: unless-stopped

  # ==========================================================================
  # API - Hono + WebSocket Service
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: synergy-api
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - PORT=4000
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
    networks:
      - synergy-network
    restart: unless-stopped

networks:
  synergy-network:
    name: synergy-network
    external: true
