services:
  # Assistente Geral (Llama 3.2)
  ollama-geral:
    image: ollama/ollama
    container_name: assistente-geral
    ports:
      - "11434:11434"
    volumes:
      - ollama-geral:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Assistente de Código (CodeLlama)
  ollama-codigo:
    image: ollama/ollama
    container_name: assistente-codigo
    ports:
      - "11435:11434"
    volumes:
      - ollama-codigo:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Assistente Criativo
  ollama-criativo:
    image: ollama/ollama
    container_name: assistente-criativo
    ports:
      - "11436:11434"
    volumes:
      - ollama-criativo:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  ollama-geral:
  ollama-codigo:
  ollama-criativo:
