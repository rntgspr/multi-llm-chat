# Multi-LLM Chat - Ollama Services
#
# Usage:
#   docker compose up -d                    # Start all
#   docker compose logs -f                  # View logs
#   docker compose down                     # Stop all
#
# Pull models after starting:
#   docker exec ollama-orchestrator ollama pull llama3.2
#   docker exec ollama-general ollama pull llama3.2
#   docker exec ollama-code ollama pull codellama:7b
#   docker exec ollama-creative ollama pull llama3.2

x-ollama: &ollama-base
  image: ollama/ollama
  environment:
    - OLLAMA_HOST=0.0.0.0
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s
  restart: unless-stopped

services:
  # ==========================================================================
  # ORCHESTRATOR - LLM that decides which assistant should respond
  # ==========================================================================
  ollama-orchestrator:
    <<: *ollama-base
    container_name: ollama-orchestrator
    ports:
      - "11430:11434"
    volumes:
      - ollama-orchestrator:/root/.ollama

  # ==========================================================================
  # ASSISTANTS
  # ==========================================================================
  ollama-general:
    <<: *ollama-base
    container_name: ollama-general
    ports:
      - "11434:11434"
    volumes:
      - ollama-general:/root/.ollama

  ollama-code:
    <<: *ollama-base
    container_name: ollama-code
    ports:
      - "11435:11434"
    volumes:
      - ollama-code:/root/.ollama

  ollama-creative:
    <<: *ollama-base
    container_name: ollama-creative
    ports:
      - "11436:11434"
    volumes:
      - ollama-creative:/root/.ollama

volumes:
  ollama-orchestrator:
  ollama-general:
  ollama-code:
  ollama-creative:
