# Multi-LLM Chat - Infrastructure Services
#
# Usage:
#   docker compose up -d                    # Start infra (DB + Redis)
#   docker compose logs -f                  # View logs
#   docker compose down                     # Stop all
#
# For LLM services, use docker-compose.llm.yml:
#   docker compose -f docker-compose.llm.yml up -d

services:
  # ==========================================================================
  # DATABASE - SurrealDB for chat persistence
  # ==========================================================================
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: multi-llm-surrealdb
    user: "0:0"
    ports:
      - "8000:8000"
    command:
      - start
      - --log=info
      - --user=root
      - --pass=root
      - rocksdb:/data/surrealdb.db
    environment:
      - SURREAL_NAMESPACE=multi_llm_chat
      - SURREAL_DATABASE=chat
    volumes:
      - surrealdb_data:/data
    networks:
      - multi-llm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # CACHE / PUB-SUB - Redis
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: multi-llm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - multi-llm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  surrealdb_data:
    driver: local
  redis_data:
    driver: local

networks:
  multi-llm-network:
    name: multi-llm-network
    driver: bridge
