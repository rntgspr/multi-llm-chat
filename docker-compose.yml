# Synergy Chat - Infrastructure Services (DB + Cache)
#
# Usage:
#   docker compose up -d                    # Start infra only
#   docker compose logs -f                  # View logs
#   docker compose down                     # Stop all
#
# For apps (web + api):
#   docker compose -f docker-compose.apps.yml up -d
#
# For LLM services (Ollama):
#   docker compose -f docker-compose.llm.yml up -d

name: synergy-chat

services:
  # ==========================================================================
  # DATABASE - SurrealDB for chat persistence
  # ==========================================================================
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: synergy-surrealdb
    user: "0:0"
    ports:
      - "8000:8000"
    command:
      - start
      - --log=info
      - --user=root
      - --pass=root
      - rocksdb:/data/surrealdb.db
    environment:
      - SURREAL_NAMESPACE=synergy_chat
      - SURREAL_DATABASE=chat
    volumes:
      - surrealdb_data:/data
    networks:
      - synergy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # CACHE / PUB-SUB - Redis
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: synergy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - synergy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  surrealdb_data:
    driver: local
  redis_data:
    driver: local

networks:
  synergy-network:
    name: synergy-network
    driver: bridge
