# Multi-LLM Chat - LLM Services (Ollama)
#
# Prerequisites: Core services must be running first
#   docker compose up -d
#
# Usage:
#   docker compose -f docker-compose.llm.yml up -d        # Start all LLMs
#   docker compose -f docker-compose.llm.yml logs -f      # View logs
#   docker compose -f docker-compose.llm.yml down         # Stop all LLMs
#
# Pull models after starting:
#   docker exec ollama-orchestrator ollama pull llama3.2
#   docker exec ollama-general ollama pull llama3.2
#   docker exec ollama-code ollama pull codellama:7b
#   docker exec ollama-creative ollama pull llama3.2

name: multi-llm-agents

x-ollama: &ollama-base
  image: ollama/ollama
  env_file:
    - .env.local
  environment:
    - OLLAMA_HOST=0.0.0.0
  healthcheck:
    test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s
  networks:
    - multi-llm-network
  restart: unless-stopped

services:
  # ==========================================================================
  # ORCHESTRATOR - LLM that decides which assistant should respond
  # ==========================================================================
  ollama-orchestrator:
    <<: *ollama-base
    container_name: ollama-orchestrator
    ports:
      - "11430:11434"
    volumes:
      - ollama-orchestrator:/root/.ollama

  # ==========================================================================
  # ASSISTANTS
  # ==========================================================================
  ollama-general:
    <<: *ollama-base
    container_name: ollama-general
    ports:
      - "11434:11434"
    volumes:
      - ollama-general:/root/.ollama

  ollama-code:
    <<: *ollama-base
    container_name: ollama-code
    ports:
      - "11435:11434"
    volumes:
      - ollama-code:/root/.ollama

  ollama-creative:
    <<: *ollama-base
    container_name: ollama-creative
    ports:
      - "11436:11434"
    volumes:
      - ollama-creative:/root/.ollama

volumes:
  ollama-orchestrator:
  ollama-general:
  ollama-code:
  ollama-creative:

networks:
  multi-llm-network:
    name: multi-llm-network
    external: true
